<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/760b11fa71.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Player Info</title>
</head>
<body>
    <h1>Enter Player Username</h1>
    <div class="getInfo">
        <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        <button onclick="getPlayerInfo()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    
    <p id="playerName">Player Name: </p>
    <p id="playerId">Player ID: </p>
    <p id="playerRank">Player Rank: </p>
    <p id="playerLevel">Player Level: </p>
    
    <script src="main.js"></script>
</body>
</html>
